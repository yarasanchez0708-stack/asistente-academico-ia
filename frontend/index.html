<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Academic Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0f13;
      --surface:  #16181f;
      --border:   #2a2d38;
      --accent:   #c8f135;
      --accent2:  #5b8cff;
      --danger:   #ff5c5c;
      --text:     #e8eaf0;
      --muted:    #6b7080;
      --radius:   10px;
      --font:     'Syne', sans-serif;
      --mono:     'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
    .status-pill {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-pill.connected { border-color: var(--accent); color: var(--accent); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 1px;
      padding: 0 40px;
      margin: 32px 0 0;
    }
    .stat {
      flex: 1;
      background: var(--surface);
      padding: 20px 24px;
      border: 1px solid var(--border);
    }
    .stat:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .stat:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
    .stat-value {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
    }

    /* ── Main grid ── */
    .main {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      padding: 32px 40px 0;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }
    .card-title {
      font-size: 0.75rem;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 22px;
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.8rem;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent2); }
    textarea { resize: vertical; min-height: 72px; }
    select option { background: var(--surface); }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--accent); color: #0e0f13; }
    .btn-primary:hover { opacity: .88; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,241,53,.06);
    }

    /* ── Task list ── */
    #task-list { display: flex; flex-direction: column; gap: 12px; }

    .task-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      transition: border-color .2s;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-card:hover { border-color: var(--border); }
    .task-card.completed { opacity: .5; }
    .task-card.completed .task-title { text-decoration: line-through; }

    .task-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 6px; }
    .task-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tag {
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .tag.high   { border-color: var(--danger);  color: var(--danger); }
    .tag.medium { border-color: var(--accent2); color: var(--accent2); }
    .tag.low    { border-color: var(--muted);   color: var(--muted); }

    .task-actions { display: flex; gap: 8px; align-self: start; }
    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .icon-btn:hover { background: var(--surface); color: var(--text); }
    .icon-btn.complete:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.delete:hover  { border-color: var(--danger);  color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.85rem;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 12px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-size: 0.85rem;
      font-family: var(--mono);
      z-index: 999;
      animation: toastIn .2s ease;
      transition: opacity .3s;
    }
    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error   { border-color: var(--danger); color: var(--danger); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 800px) {
      .main { grid-template-columns: 1fr; }
      header, .stats-bar, .main { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Academic Assistant
  </div>
  <div class="status-pill" id="status-pill">
    <span class="status-dot"></span>
    <span id="status-text">connecting...</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-value" id="stat-total">—</div>
    <div class="stat-label">Total Tasks</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-pending">—</div>
    <div class="stat-label">Pending</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-completed">—</div>
    <div class="stat-label">Completed</div>
  </div>
</div>

<div class="main">

  <!-- ── Form panel ── -->
  <div class="card">
    <div class="card-title">New Task</div>

    <div class="field">
      <label>Title</label>
      <input id="f-title" type="text" placeholder="e.g. Calculus homework"/>
    </div>
    <div class="field">
      <label>Subject</label>
      <input id="f-subject" type="text" placeholder="e.g. Mathematics"/>
    </div>
    <div class="field">
      <label>Due Date</label>
      <input id="f-due" type="date"/>
    </div>
    <div class="field">
      <label>Priority</label>
      <select id="f-priority">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="field">
      <label>Description (optional)</label>
      <textarea id="f-desc" placeholder="Additional notes..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="createTask()">Add Task</button>
  </div>

  <!-- ── Task list panel ── -->
  <div class="card">
    <div class="card-title">Task Board</div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
    </div>

    <div id="task-list">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        Loading tasks...
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
